name: Build & Release

on:
  push:
    tags:
      - "v*"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (e.g. v1.2.0). Leave empty to just build without releasing."
        required: false
        default: ""
      build_windows:
        description: "Build Windows"
        type: boolean
        default: true
      build_macos:
        description: "Build macOS"
        type: boolean
        default: true
      build_linux:
        description: "Build Linux"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────
  build-windows:
    name: Build Windows
    if: github.event_name == 'push' || github.event_name == 'pull_request' || inputs.build_windows
    uses: ./.github/workflows/build-windows.yml
    permissions:
      contents: write
    secrets: inherit
    with:
      version: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || (startsWith(github.ref, 'refs/tags/') && github.ref_name || '') }}

  # ─────────────────────────────────────────
  build-macos:
    name: Build macOS
    if: github.event_name == 'push' || github.event_name == 'pull_request' || inputs.build_macos
    uses: ./.github/workflows/build-macos.yml
    permissions:
      contents: write
    secrets: inherit
    with:
      version: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || (startsWith(github.ref, 'refs/tags/') && github.ref_name || '') }}

  # ─────────────────────────────────────────
  build-linux:
    name: Build Linux
    if: github.event_name == 'push' || github.event_name == 'pull_request' || inputs.build_linux
    uses: ./.github/workflows/build-linux.yml
    permissions:
      contents: write
    secrets: inherit
    with:
      version: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || (startsWith(github.ref, 'refs/tags/') && github.ref_name || '') }}
